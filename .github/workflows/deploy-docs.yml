# Site base is `/` (see src/.vuepress/config.ts). For https://davidliuk.github.io/ without /blog,
# GitHub Pages must serve this build from the user-site repo `davidliuk.github.io`, or use a custom domain
# on this repo. A project repo alone only gets https://davidliuk.github.io/<repo>/ unless configured otherwise.

name: Blog Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 避免连续 push 时两次部署抢写同一远端分支
concurrency:
  group: deploy-davidliuk-github-io
  cancel-in-progress: true

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      # 跨仓库部署必须用 persist-credentials: false，否则会沿用 GITHUB_TOKEN，
      # 与 GH_PAGES_TOKEN 混用，导致 JamesIves action 里 git 状态错乱 / push 失败。
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # 1. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # 版本由仓库根目录 package.json 的 packageManager（pnpm@10.33.0）决定，勿在此再写 version

      # 2. 设置 Node.js 并开启 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4 # 升级到 v4
        with:
          node-version: 22 # 建议用 20 或 22，保持和你本地一致
          cache: "pnpm"

      # 3. 安装依赖
      # --frozen-lockfile 表示：如果 lock 文件和 package.json 不匹配，直接报错
      # 这样能强制保证 CI 环境和本地环境完全一致
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. 构建
      - name: Build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: pnpm run docs:build

      # 5. 部署到用户站仓库 davidliuk.github.io（根域名 https://davidliuk.github.io/）
      # - Secrets: blog 仓库需配置 GH_PAGES_TOKEN（PAT，对 davidliuk.github.io 有 contents:write）
      # - Pages: 在 davidliuk.github.io → Settings → Pages → Branch 选 gh-pages，目录 /
      #   （站点文件在 gh-pages 分支；main 可只保留 README，避免与 action 抢 main）
      - name: Deploy to user site repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GH_PAGES_TOKEN }}
          repository-name: davidliuk/davidliuk.github.io
          branch: gh-pages
          folder: src/.vuepress/dist
          clean: true
          single-commit: true
          commit-message: Deploy site from davidliuk/blog
